.values-table td:last-child { color: #111827; }

// ─── DIALOG LOGIC ─────────────────────────────────────────────────────────────
const overlay = document.getElementById('dialog-overlay');
const titleEl = document.getElementById('dialog-title');
const bodyEl  = document.getElementById('dialog-body');

function showDialog(key, data) {
  titleEl.textContent = key;
  let html = '';

  if (data.norms && data.norms.length) {
    html += `<div class="dlg-section"><h3>Normen &amp; Standards</h3><div class="norm-badges">`;
    data.norms.forEach(n => { html += `<span class="norm-badge">${n}</span>`; });
    html += `</div></div>`;
  }

  if (data.values && data.values.length) {
    html += `<div class="dlg-section"><h3>Technische Werte</h3><table class="values-table">`;
    data.values.forEach(([k, v]) => { html += `<tr><td>${k}</td><td>${v}</td></tr>`; });
    html += `</table></div>`;
  }

  if (data.desc) {
    html += `<div class="dlg-section"><h3>Beschreibung</h3><p class="dlg-desc">${data.desc}</p></div>`;
  }

  bodyEl.innerHTML = html;
  overlay.classList.add('open');
}

function hideDialog() { overlay.classList.remove('open'); }

document.getElementById('dialog-close').addEventListener('click', hideDialog);
overlay.addEventListener('click', e => { if (e.target === overlay) hideDialog(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideDialog(); });

// ─── ATTACH CLICK HANDLERS VIA MUTATION OBSERVER ─────────────────────────────
const attached = new WeakSet();

function attachHandlers() {
  document.querySelectorAll('g.markmap-node').forEach(node => {
    if (attached.has(node)) return;
    const fo = node.querySelector('foreignObject');
    if (!fo) return;
    const text = fo.textContent.trim();
    if (DETAILS[text]) {
      attached.add(node);
      fo.style.cursor = 'pointer';
      node.classList.add('has-detail');
      fo.addEventListener('click', e => {
        e.stopPropagation();
        showDialog(text, DETAILS[text]);
      });
    }
  });
}

const observer = new MutationObserver(attachHandlers);
observer.observe(document.getElementById('mindmap'), { childList: true, subtree: true });
// Also run after initial render
setTimeout(attachHandlers, 800);
setTimeout(attachHandlers, 2000);
</script>
